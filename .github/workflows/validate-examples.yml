name: Validate Examples

on:
  pull_request:
    paths:
      - 'examples/**'
      - 'scripts/validate-examples.js'
      - '.github/workflows/validate-examples.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'examples/**'
  workflow_dispatch:

jobs:
  # Job 1: Validate example structure, README sections, and Qase feature coverage
  check-structure:
    name: Validate Structure and Features
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build reporters
        run: npm run build -ws --if-present

      - name: Run validation script
        run: node scripts/validate-examples.js

  # Job 2: Run tests for each example independently
  test-examples:
    name: Test ${{ matrix.example }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - playwright
          - cypress
          - testcafe
          - wdio
          - jest
          - mocha
          - vitest
          - cucumberjs
          - newman

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build reporters
        run: npm run build -ws --if-present

      # Playwright-specific: Install Chromium browser with system dependencies
      - name: Install Playwright browsers
        if: matrix.example == 'playwright'
        run: npx playwright install chromium --with-deps

      # Cypress-specific: Install Cypress binary and system dependencies
      - name: Install Cypress
        if: matrix.example == 'cypress'
        run: |
          npx cypress install
          sudo apt-get update
          sudo apt-get install -y libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libnss3 libxss1 libasound2 libxtst6 xauth xvfb

      - name: Run example tests
        id: run-tests
        continue-on-error: true
        timeout-minutes: 5
        working-directory: examples/single/${{ matrix.example }}
        env:
          QASE_MODE: off
        run: npm test

      # Always report the outcome (even if test failed)
      - name: Report test result
        if: always()
        run: |
          if [ "${{ steps.run-tests.outcome }}" == "success" ]; then
            echo "✅ ${{ matrix.example }} tests passed"
          else
            echo "⚠️ ${{ matrix.example }} tests failed (continue-on-error enabled for public API reliability)"
            echo "Note: Test failures with QASE_MODE=off may indicate example issues or flaky public APIs"
          fi
